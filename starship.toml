"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ ](bg:#1d2230)[ ](bg:#495065)[ ](bg:#757e9b)\
$os\
$username\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$git_state\
[](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
$python\
$java\
$ruby\
$docker_context\
$package\
[](fg:#212736 bg:#1d2230)\
$cmd_duration\
$time\
[](fg:#1d2230)\
\n$character"""

# ─── Prompt Character ───────────────────────────────────────

[character]
success_symbol = "[](fg:#769ff0)"
error_symbol = "[](fg:#e06c75)"

# ─── Username ────────────────────────────────────────────────                                                    
                                                                                                                     
[username]
show_always = true                                                                                                 
style_user = "bg:#a3aed2 fg:#090c0c"                      
style_root = "bg:#a3aed2 fg:#e06c75"                                                                               
format = "[ $user ]($style)"
 
# ─── Directory ────────────────────────────────────────────────

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "󰋜 "
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# ─── Git (Chinese TC labels) ─────────────────────────────────

[git_branch]
symbol = " "
style = "bg:#394260"
format = '[[ 位於 $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_commit]
tag_symbol = "  "

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
conflicted = "衝突"
ahead = "領先"
behind = "落後"
modified = "修改"
staged = "暫存"
untracked = "未追蹤"
deleted = "刪除"
renamed = "重新命名"
stashed = "貯存"

[git_state]
style = "bg:#394260"
format = '[[ $state($progress_current/$progress_total) ](fg:#769ff0 bg:#394260)]($style)'
rebase = "重定基底"
merge = "合併"
revert = "還原"
cherry_pick = "揀選"
bisect = "二分搜尋"
am = "am"
am_or_rebase = "am/重定基底"

# ─── VCS (Chinese TC) ────────────────────────────────────────

[fossil_branch]
symbol = " "
style = "bg:#394260"
format = '[[ 位於 $symbol$branch ](fg:#769ff0 bg:#394260)]($style)'

[hg_branch]
symbol = " "
style = "bg:#394260"
format = '[[ 位於 $symbol$branch ](fg:#769ff0 bg:#394260)]($style)'

# ─── Languages (tokyo-night bg layer) ────────────────────────

[nodejs]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "󱘗 "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol ($version) (\($virtualenv\)) ](fg:#769ff0 bg:#212736)]($style)'

[java]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[ruby]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[docker_context]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

# ─── Package (Chinese TC) ────────────────────────────────────

[package]
symbol = "󰏗 "
style = "bg:#212736"
format = '[[ 為 $symbol$version ](fg:#769ff0 bg:#212736)]($style)'

# ─── Duration & Time (Chinese TC) ────────────────────────────

[cmd_duration]
style = "bg:#1d2230"
format = '[[ 歷 $duration ](fg:#a0a9cb bg:#1d2230)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

# ─── OS (auto-detected) ──────────────────────────────────────

[os]
disabled = false
style = "bg:#a3aed2 fg:#090c0c"
format = "[ $symbol ]($style)"

