"$schema" = 'https://starship.rs/config-schema.json'

# ─────────────────────────────────────────────────────────────
# Kali-style two-line framed prompt, ANSI colors that adapt to
# the terminal theme (like `ssh airbug`):
#
#   ┌──(user<os>host)-[~/dir]-[ git ]-[ langs ]-[ time ]   <os> = OS glyph connector
#   └─$
#
# Same information as before (os/host/user, dir, git branch/
# status/state, all languages, package, cmd_duration, time),
# just re-framed in Kali's box style instead of powerline bg.
# Each -[…] group is wrapped in (…) so it vanishes when empty.
# ─────────────────────────────────────────────────────────────

format = """
[┌──](green)\
$username\
$os\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$rust\
$golang\
$php\
$python\
$java\
$ruby\
$docker_context\
$package\
$cmd_duration\
$time
[└─](green)$character"""

# ─── Prompt Character (Kali $ / #) ───────────────────────────

[character]
success_symbol = '[\$](bold blue)'
error_symbol = '[\$](bold red)'

# ─── Identity: ( user<os>host ) — OS glyph joins user & host ─

[os]
disabled = false
format = '[$symbol](bold blue)'

[username]
show_always = true
style_user = "bold blue"
style_root = "bold red"
format = '[\(](green)[$user]($style)'

[hostname]
ssh_only = false
format = '[$hostname](bold blue)[\)](green)'

# ─── Directory: -[ ~/dir ] ───────────────────────────────────

[directory]
style = "bold"
read_only_style = "bold red"
format = '[-\[](green)[$path]($style)[$read_only]($read_only_style)[\]](green)'
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "󰋜 "
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# ─── Git (Chinese TC labels) ─────────────────────────────────

[git_branch]
symbol = " "
format = '([-\[](green)[位於 $symbol$branch](bold purple)[\]](green))'

[git_commit]
tag_symbol = "  "

[git_status]
format = '([-\[](green)[$all_status$ahead_behind](bold red)[\]](green))'
conflicted = "衝突"
ahead = "領先"
behind = "落後"
modified = "修改"
staged = "暫存"
untracked = "未追蹤"
deleted = "刪除"
renamed = "重新命名"
stashed = "貯存"

[git_state]
format = '([-\[](green)[$state($progress_current/$progress_total)](bold yellow)[\]](green))'
rebase = "重定基底"
merge = "合併"
revert = "還原"
cherry_pick = "揀選"
bisect = "二分搜尋"
am = "am"
am_or_rebase = "am/重定基底"

# ─── Other VCS (Chinese TC) ──────────────────────────────────

[fossil_branch]
symbol = " "
format = '([-\[](green)[位於 $symbol$branch](bold purple)[\]](green))'

[hg_branch]
symbol = " "
format = '([-\[](green)[位於 $symbol$branch](bold purple)[\]](green))'

# ─── Languages ───────────────────────────────────────────────

[nodejs]
symbol = " "
format = '([-\[](green)[$symbol$version](bold cyan)[\]](green))'

[rust]
symbol = "󱘗 "
format = '([-\[](green)[$symbol$version](bold cyan)[\]](green))'

[golang]
symbol = " "
format = '([-\[](green)[$symbol$version](bold cyan)[\]](green))'

[php]
symbol = " "
format = '([-\[](green)[$symbol$version](bold cyan)[\]](green))'

[python]
symbol = " "
format = '([-\[](green)[$symbol$version(\($virtualenv\))](bold cyan)[\]](green))'

[java]
symbol = " "
format = '([-\[](green)[$symbol$version](bold cyan)[\]](green))'

[ruby]
symbol = " "
format = '([-\[](green)[$symbol$version](bold cyan)[\]](green))'

[docker_context]
symbol = " "
format = '([-\[](green)[$symbol$context](bold cyan)[\]](green))'

# ─── Package (Chinese TC) ────────────────────────────────────

[package]
symbol = "󰏗 "
format = '([-\[](green)[為 $symbol$version](bold yellow)[\]](green))'

# ─── Duration & Time (Chinese TC) ────────────────────────────

[cmd_duration]
format = '([-\[](green)[歷 $duration](bold yellow)[\]](green))'

[time]
disabled = false
time_format = "%R"
format = '[-\[](green)[ $time](bold white)[\]](green)'

